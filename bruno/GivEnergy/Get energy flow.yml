info:
  name: Get energy flow
  type: http
  seq: 2

http:
  method: POST
  url: https://api.givenergy.cloud/v1/inverter/ED2253G277/energy-flows
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "start_time": "2025-09-01",
        "end_time": "2025-09-02",
        "grouping": 0,
        "types": [0]
      }
  auth:
    type: bearer
    token: "{{GIVENERGY_API_KEY}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  To calculate solar used by home.

  Take snapshot of every 6th record

  solar home usage = today.solar - (today.grid.export + today.battery.charge)
